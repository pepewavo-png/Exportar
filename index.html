<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel de Respuestas</title>

<link rel="stylesheet" href="estilos.css">

<style>

.respuestas {
  display: grid;
  gap: 20px;
  margin-top: 20px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.card h3 {
  margin-bottom: 10px;
  color: #007BFF;
}

.card p {
  margin: 5px 0;
}
</style>

</head>

<body>

<div class="container">

<h1>Panel de Respuestas</h1>

<button id="exportar">Exportar a Excel</button>

<div id="contenedorRespuestas" class="respuestas"></div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
